name: gaia-smoke-test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: gaia-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Enforce No Sandbox Doctrine
        run: python scripts/check_no_sandbox_doctrine.py

      - name: Enforce Runtime Baseline
        run: python scripts/check_runtime_baseline.py

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Ensure smoke test is executable
        run: chmod +x ./scripts/smoke_test_gaia.sh

      - name: Run Gaia smoke test
        run: ./scripts/smoke_test_gaia.sh
