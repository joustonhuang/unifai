name: OpenClaw Native CI/CD Pipeline

on:
  push:
    branches: [ main, develop, "feat/**" ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "0 2 * * *"  # Daily build at 02:00 UTC

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "18"
  INSTALL_PREFIX: "/opt/unifai"

jobs:
  ##############################################################################
  # JOB 1: Lint & Format Check
  ##############################################################################
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install lint dependencies
        run: |
          pip install flake8 black pylint
          npm install -g eslint prettier

      - name: Run Python lint (flake8)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Run Python format check (black)
        run: black --check . --diff
        continue-on-error: true

      - name: Run JavaScript lint (eslint)
        run: eslint . --ext .js,.ts --max-warnings 10
        continue-on-error: true

  ##############################################################################
  # JOB 2: Unit Tests (Python + Node)
  ##############################################################################
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest pytest-cov

      - name: Install Node dependencies
        run: npm install
        continue-on-error: true

      - name: Run Python tests
        run: pytest tests/ -v --tb=short --cov --cov-report=xml
        continue-on-error: true

      - name: Run Node tests
        run: npm test
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  ##############################################################################
  # JOB 3: Native Installation Simulation
  ##############################################################################
  install-test:
    name: Installation Test (Native)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Simulate installer.sh (dry-run)
        run: |
          bash -n installer.sh
          echo "Installer syntax check: PASSED ✓"

      - name: Check service definitions
        run: |
          if grep -q "unifai-secretvault.service" installer.sh; then
            echo "Service: unifai-secretvault - FOUND ✓"
          fi
          if grep -q "unifai-keyman.service" installer.sh; then
            echo "Service: unifai-keyman - FOUND ✓"
          fi
          if grep -q "unifai-supervisor.service" installer.sh; then
            echo "Service: unifai-supervisor - FOUND ✓"
          fi
          if grep -q "unifai-openclaw.service" installer.sh; then
            echo "Service: unifai-openclaw - FOUND ✓"
          fi

      - name: Verify environment template
        run: |
          if grep -q "OPENAI_BASE_URL" installer.sh; then
            echo "LLM Config: Local LM Studio - CONFIGURED ✓"
          fi

  ##############################################################################
  # JOB 4: Security Scan
  ##############################################################################
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy scan to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  ##############################################################################
  # JOB 5: Build & Deploy (Main branch only)
  ##############################################################################
  deploy:
    name: Build & Deploy (Main Branch)
    runs-on: ubuntu-latest
    needs: [install-test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Create deployment artifact
        run: |
          mkdir -p build/unifai
          cp installer.sh build/unifai/
          cp -r . build/unifai/ --exclude=.git --exclude=node_modules
          tar -czf unifai-native-${{ github.sha }}.tar.gz -C build unifai/
          ls -lh unifai-native-*.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: unifai-native-build
          path: unifai-native-*.tar.gz

      - name: Create GitHub Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: unifai-native-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ##############################################################################
  # Job Summary
  ##############################################################################
  summary:
    name: CI/CD Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint, test, install-test, security, deploy]
    if: always()
    steps:
      - name: Print Pipeline Status
        run: |
          echo "=== UnifAI CI/CD Pipeline Complete ==="
          echo "Lint: ${{ needs.lint.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Install Test: ${{ needs.install-test.result }}"
          echo "Security Scan: ${{ needs.security.result }}"
          echo "Deploy: ${{ needs.deploy.result }}"
          echo "============================================"
